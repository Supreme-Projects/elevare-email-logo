<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elevare Investments — Email Logo</title>
  <meta name="description" content="Hosted logo for Microsoft 365 email signatures.">
  <link rel="icon" type="image/png" href="/assets/logo-email.png">
  <style>
    html,body{height:100%;margin:0;background:#FAFAFA;color:#0F2D3F;font-family:Inter,Montserrat,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .wrap{min-height:100%;display:grid;place-items:center;padding:24px}
    img{max-width:90vw;height:auto;display:block}
    .note{position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:12px;opacity:.6}
    code{background:#fff;padding:2px 6px;border-radius:6px;border:1px solid #eee}
  </style>
</head>
<body>
  <main class="wrap">
    <div>
      <img src="/assets/elevare-email-logo-trans.png" width="133" height="120" alt="Elevare Investments">
      <p style="text-align:center;margin-top:12px;">Direct image URL for signatures: <code>/assets/elevare-email-logo-trans.png</code></p>
    </div>
  </main>
  <div class="note">© 2025 Elevare Investments</div>
</body>
</html>
